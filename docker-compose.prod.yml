services:
  api:
    build: .
    image: decentralthink-core:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgres://dtcore:${POSTGRES_PASSWORD}@postgres:5432/decentralthink
      - OPA_URL=http://opa:8181
      - ALGORAND_NETWORK=testnet
      - OLLAMA_URL=http://host.docker.internal:11434
      - HERMES_MODEL=nous-hermes2
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      opa:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dtcore.rule=Host(`core.decentralthink.com`)"
      - "traefik.http.routers.dtcore.entrypoints=websecure"
      - "traefik.http.routers.dtcore.tls.certresolver=letsencrypt"
      - "traefik.http.services.dtcore.loadbalancer.server.url=http://127.0.0.1:3001"
    networks:
      - dtcore

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dtcore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: decentralthink
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dtcore -d decentralthink"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dtcore

  opa:
    image: openpolicyagent/opa:latest
    restart: unless-stopped
    command: run --server --log-level=info /policies
    volumes:
      - ./src/policy/rego:/policies
    networks:
      - dtcore

volumes:
  postgres_data:

networks:
  dtcore:
    driver: bridge
