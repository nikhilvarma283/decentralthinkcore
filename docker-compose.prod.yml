services:
  api:
    build: .
    image: decentralthink-core:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgres://dtcore:${POSTGRES_PASSWORD}@postgres:5432/decentralthink
      - OPA_URL=http://opa:8181
      - ALGORAND_NETWORK=testnet
      # Ollama runs as a container in this compose — NOT on the host anymore.
      - OLLAMA_URL=http://ollama:11434
      - HERMES_MODEL=${HERMES_MODEL:-nous-hermes2}
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      opa:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dtcore.rule=Host(`core.decentralthink.com`)"
      - "traefik.http.routers.dtcore.entrypoints=websecure"
      - "traefik.http.routers.dtcore.tls.certresolver=letsencrypt"
      # Use the container's internal port — Traefik is on the dtcore network.
      - "traefik.http.services.dtcore.loadbalancer.server.port=3000"
    networks:
      - dtcore

  # ── Ollama — self-hosted Hermes inference ─────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    # Remove or adjust the port mapping to avoid exposing Ollama publicly.
    # Only the api container needs to reach it (via the dtcore network).
    expose:
      - "11434"
    networks:
      - dtcore
    # Uncomment to enable GPU (requires nvidia-container-toolkit on the host):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── One-shot model pull — runs before api starts ──────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/pull-model.sh:/pull-model.sh:ro
    entrypoint: ["/bin/sh", "/pull-model.sh"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - HERMES_MODEL=${HERMES_MODEL:-nous-hermes2}
    depends_on:
      - ollama
    networks:
      - dtcore

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dtcore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: decentralthink
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dtcore -d decentralthink"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dtcore

  opa:
    image: openpolicyagent/opa:latest
    restart: unless-stopped
    command: run --server --addr 0.0.0.0:8181 --log-level=info /policies
    volumes:
      - ./src/policy/rego:/policies
    networks:
      - dtcore

volumes:
  postgres_data:
  ollama_data:    # persists Hermes model weights — avoids re-downloading on every deploy

networks:
  dtcore:
    driver: bridge
